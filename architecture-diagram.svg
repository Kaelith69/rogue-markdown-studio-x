<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#11131c"/>
    </linearGradient>
    
    <!-- Accent Color Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Glowing effect filter -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" stroke="#25293d" stroke-width="2" rx="12"/>

  <!-- Title Section -->
  <g transform="translate(30, 40)">
    <text x="0" y="0" font-family="'Space Grotesk', system-ui, sans-serif" font-size="20" font-weight="800" fill="#f1f5f9">ROGUE MARKDOWN STUDIO X</text>
    <text x="0" y="20" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">System Architecture (Monolithic Single-Page Application)</text>
  </g>

  <!-- ==================== LAYER 1: CLIENT USER INTERFACE (DOM) ==================== -->
  <g transform="translate(30, 90)">
    <!-- Container -->
    <rect width="740" height="110" fill="#11131c" stroke="#25293d" stroke-width="2" rx="10"/>
    <text x="15" y="-10" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="1">LAYER 1: USER INTERFACE (DOM &amp; LAYOUT)</text>
    
    <!-- Sidebar Insert Tools -->
    <g transform="translate(15, 20)">
      <rect width="110" height="70" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
      <text x="55" y="28" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="700" fill="#f1f5f9" text-anchor="middle">Sidebar Tools</text>
      <text x="55" y="44" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle">Header, Lists, Table,</text>
      <text x="55" y="56" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle">Math, Diagrams, Links</text>
    </g>

    <!-- Main Workspace Split layout -->
    <g transform="translate(140, 20)">
      <rect width="440" height="70" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
      <text x="220" y="20" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="700" fill="#f1f5f9" text-anchor="middle">Workspace Container (Interactive split grid)</text>
      
      <!-- Editor Column representation -->
      <rect x="15" y="30" width="190" height="30" fill="#181b28" stroke="#6366f1" stroke-width="1.2" rx="4"/>
      <text x="110" y="48" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#6366f1" text-anchor="middle">Markdown Editor Panel</text>
      
      <!-- Preview Column representation -->
      <rect x="235" y="30" width="190" height="30" fill="#181b28" stroke="#25293d" stroke-width="1.2" rx="4"/>
      <text x="330" y="48" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">Live Preview Panel</text>
    </g>

    <!-- Header Controls -->
    <g transform="translate(595, 20)">
      <rect width="130" height="70" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
      <text x="65" y="28" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="700" fill="#f1f5f9" text-anchor="middle">Config Selectors</text>
      <text x="65" y="45" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle">Themes, Fonts, and</text>
      <text x="65" y="57" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle">Layout Select Options</text>
    </g>
  </g>

  <!-- Connection: UI Layer to Pipeline Orchestrator -->
  <g stroke="#25293d" stroke-width="2" fill="none">
    <path d="M 230,200 L 230,230" marker-end="url(#arrow)"/>
    <path d="M 570,200 L 570,230" marker-end="url(#arrow)"/>
  </g>

  <!-- ==================== LAYER 2: SYSTEM PIPELINE (JS ORCHESTRATION) ==================== -->
  <g transform="translate(30, 235)">
    <rect width="740" height="90" fill="#11131c" stroke="#25293d" stroke-width="2" rx="10"/>
    <text x="15" y="-10" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#8b5cf6" letter-spacing="1">LAYER 2: EVENT PIPELINE &amp; STORAGE ORCHESTRATOR</text>
    
    <!-- Input/Input trigger handlers -->
    <g transform="translate(15, 20)">
      <rect width="210" height="50" fill="url(#primaryGrad)" rx="6" filter="url(#subtleGlow)"/>
      <text x="105" y="24" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Input Trigger Pipeline</text>
      <text x="105" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#e0f2fe" text-anchor="middle">200ms Debouncer | Math Tokenizer</text>
    </g>

    <!-- State Synchronizers -->
    <g transform="translate(240, 20)">
      <rect width="250" height="50" fill="#0a0b10" stroke="#8b5cf6" stroke-width="1.5" rx="6"/>
      <text x="125" y="22" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="700" fill="#f1f5f9" text-anchor="middle">Orchestration &amp; Sync Handlers</text>
      <text x="125" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-size="8.5" font-weight="500" fill="#94a3b8" text-anchor="middle">Click Checklist Sync | Bi-directional Scroll Lock</text>
    </g>

    <!-- Storage Layer -->
    <g transform="translate(505, 20)">
      <rect width="220" height="50" fill="url(#orangeGrad)" rx="6"/>
      <text x="110" y="24" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">Client Persistent Storage</text>
      <text x="110" y="38" font-family="'JetBrains Mono', monospace" font-size="8.5" font-weight="700" fill="#fff" opacity="0.9" text-anchor="middle">localStorage [rmsx-*]</text>
    </g>
  </g>

  <!-- Connection: Pipeline to Engines -->
  <g stroke="#25293d" stroke-width="2" fill="none">
    <path d="M 230,325 L 230,355"/>
    <path d="M 570,325 L 570,355"/>
  </g>

  <!-- ==================== LAYER 3: PARSING & RENDERING PIPELINE ==================== -->
  <g transform="translate(30, 360)">
    <rect width="740" height="130" fill="#11131c" stroke="#25293d" stroke-width="2" rx="10"/>
    <text x="15" y="-10" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="700" fill="#10b981" letter-spacing="1">LAYER 3: CORE COMPILATION ENGINE (ONLINE VS. OFFLINE)</text>
    
    <!-- Engine Router status -->
    <g transform="translate(15, 15)">
      <rect width="125" height="100" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
      <text x="62.5" y="30" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="700" fill="#f1f5f9" text-anchor="middle">Engine Router</text>
      <rect x="15" y="44" width="95" height="20" fill="#1e293b" stroke="#25293d" stroke-width="1" rx="4"/>
      <text x="62.5" y="57" font-family="'JetBrains Mono', monospace" font-size="8.5" font-weight="700" fill="#6366f1" text-anchor="middle">onlineMode</text>
      <text x="62.5" y="85" font-family="'Plus Jakarta Sans', sans-serif" font-size="8" font-weight="500" fill="#94a3b8" text-anchor="middle">Detects script CDN</text>
    </g>

    <!-- Path A: Online Parser (Enhanced) -->
    <g transform="translate(155, 15)">
      <rect width="320" height="100" fill="#0c1d18" stroke="#10b981" stroke-width="1.5" rx="6"/>
      <text x="160" y="20" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="700" fill="#10b981" text-anchor="middle">Online Engine Pipeline (CDN Loaded)</text>
      
      <!-- Marked + DOMPurify box -->
      <rect x="10" y="30" width="140" height="30" fill="#0a0b10" stroke="#10b981" stroke-width="1" rx="4"/>
      <text x="80" y="48" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">marked + DOMPurify</text>

      <!-- Code highlighter (hljs) -->
      <rect x="170" y="30" width="140" height="30" fill="#0a0b10" stroke="#25293d" stroke-width="1" rx="4"/>
      <text x="240" y="48" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">highlight.js (Syntax)</text>

      <!-- KaTeX (LaTeX) and Mermaid rendering -->
      <rect x="10" y="65" width="140" height="28" fill="#0a0b10" stroke="#25293d" stroke-width="1" rx="4"/>
      <text x="80" y="82" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">KaTeX (Math block)</text>

      <rect x="170" y="65" width="140" height="28" fill="#0a0b10" stroke="#25293d" stroke-width="1" rx="4"/>
      <text x="240" y="82" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">MermaidJS (Flowcharts)</text>
    </g>

    <!-- Path B: Offline Parser (Standard fallback) -->
    <g transform="translate(490, 15)">
      <rect width="235" height="100" fill="#2d1510" stroke="#ef4444" stroke-width="1.5" rx="6"/>
      <text x="117.5" y="20" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">Offline Fallback Engine</text>
      
      <!-- Custom Parser Block -->
      <rect x="10" y="30" width="215" height="60" fill="#0a0b10" stroke="#ef4444" stroke-width="1" rx="4"/>
      <text x="117.5" y="48" font-family="'JetBrains Mono', monospace" font-size="9.5" font-weight="700" fill="#f1f5f9" text-anchor="middle">fallbackParseMarkdown()</text>
      <text x="117.5" y="65" font-family="'Plus Jakarta Sans', sans-serif" font-size="8" font-weight="500" fill="#94a3b8" text-anchor="middle">Built-in JS block-level parser</text>
      <text x="117.5" y="77" font-family="'Plus Jakarta Sans', sans-serif" font-size="8" font-weight="500" fill="#94a3b8" text-anchor="middle">(GFM nesting, checkboxes, lists, tables)</text>
    </g>
  </g>

  <!-- Arrow Marker definitions for svg paths -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#25293d"/>
    </marker>
  </defs>
</svg>
