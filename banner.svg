<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07080d"/>
      <stop offset="40%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#141722"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Filters for Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Subtle Grid Pattern in Background -->
  <g opacity="0.07">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#f1f5f9" stroke-width="1"/>
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#f1f5f9" stroke-width="1"/>
  </g>

  <!-- Glowing background elements -->
  <circle cx="950" cy="180" r="160" fill="url(#glowGradient)" filter="url(#glow)"/>
  <circle cx="150" cy="350" r="100" fill="url(#glowGradient)" filter="url(#glow)"/>

  <!-- Left Side: Branding and Typography -->
  <g transform="translate(80, 80)">
    <!-- brutalist style letter box indicator -->
    <rect x="0" y="0" width="70" height="42" fill="none" stroke="#f1f5f9" stroke-width="2.5" rx="6"/>
    <text x="35" y="27" font-family="'Space Grotesk', system-ui, sans-serif" font-size="20" font-weight="800" fill="#f1f5f9" text-anchor="middle">RMS X</text>
    
    <!-- Title -->
    <text x="0" y="100" font-family="'Space Grotesk', system-ui, sans-serif" font-size="52" font-weight="800" fill="#f1f5f9" letter-spacing="1">
      ROGUE
    </text>
    <text x="0" y="150" font-family="'Space Grotesk', system-ui, sans-serif" font-size="34" font-weight="700" fill="url(#accentGradient)" letter-spacing="0.5">
      MARKDOWN STUDIO X
    </text>
    
    <!-- Description -->
    <text x="0" y="195" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">
      Zero-Build. Offline-First. Live Preview Workspace.
    </text>
    
    <!-- Tech badges -->
    <g transform="translate(0, 225)">
      <!-- Badge 1: Mermaid -->
      <rect x="0" y="0" width="105" height="28" fill="#181b28" stroke="#25293d" stroke-width="1.5" rx="14"/>
      <circle cx="14" cy="14" r="5" fill="#6366f1"/>
      <text x="28" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#f1f5f9">Diagrams</text>
      
      <!-- Badge 2: LaTeX -->
      <rect x="117" y="0" width="85" height="28" fill="#181b28" stroke="#25293d" stroke-width="1.5" rx="14"/>
      <circle cx="131" cy="14" r="5" fill="#8b5cf6"/>
      <text x="145" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#f1f5f9">LaTeX</text>
      
      <!-- Badge 3: Sync -->
      <rect x="214" y="0" width="115" height="28" fill="#181b28" stroke="#25293d" stroke-width="1.5" rx="14"/>
      <circle cx="228" cy="14" r="5" fill="#10b981"/>
      <text x="242" y="19" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#f1f5f9">Active Sync</text>
    </g>
  </g>

  <!-- Right Side: Graphic Representation of Workspace -->
  <g transform="translate(680, 50)">
    <!-- Browser/App Panel Frame -->
    <rect x="0" y="0" width="440" height="300" fill="#11131c" stroke="#25293d" stroke-width="3" rx="16" filter="url(#subtleGlow)"/>
    
    <!-- Window Header -->
    <path d="M 0,16 L 0,44 L 440,44 L 440,16 A 16,16 0 0,0 424,0 L 16,0 A 16,16 0 0,0 0,16" fill="#181b28" stroke="#25293d" stroke-width="2"/>
    
    <!-- Window Controls (Mac style dots) -->
    <circle cx="24" cy="22" r="6" fill="#ef4444"/>
    <circle cx="44" cy="22" r="6" fill="#f59e0b"/>
    <circle cx="64" cy="22" r="6" fill="#10b981"/>
    <text x="220" y="27" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">preview.html</text>

    <!-- Side Bar Tool Strip (left inside window) -->
    <rect x="3" y="45" width="42" height="251" fill="#11131c" stroke="#25293d" stroke-width="1"/>
    <!-- Small Sidebar Buttons -->
    <rect x="11" y="60" width="26" height="26" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
    <path d="M 24,68 L 24,78 M 19,73 L 29,73" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    
    <rect x="11" y="98" width="26" height="26" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
    <text x="24" y="115" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="700" fill="#6366f1" text-anchor="middle">H1</text>
    
    <rect x="11" y="136" width="26" height="26" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
    <circle cx="24" cy="149" r="4" stroke="#94a3b8" stroke-width="2" fill="none"/>
    
    <rect x="11" y="174" width="26" height="26" fill="#6366f1" stroke="#6366f1" stroke-width="1.5" rx="6" opacity="0.8"/>
    <path d="M 19,187 L 22,190 L 29,182" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <rect x="11" y="212" width="26" height="26" fill="#0a0b10" stroke="#25293d" stroke-width="1.5" rx="6"/>
    <text x="24" y="229" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">∑</text>

    <!-- Editor Pane (Left Split) -->
    <rect x="46" y="45" width="194" height="251" fill="#0a0b10" stroke="#25293d" stroke-width="1"/>
    
    <!-- Code Editor Text Simulation -->
    <g transform="translate(60, 75)">
      <!-- Line 1: H1 Heading -->
      <text x="0" y="5" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#6366f1"># Workspace</text>
      <!-- Line 2: Paragraph -->
      <rect x="0" y="18" width="130" height="6" fill="#25293d" rx="3"/>
      <rect x="0" y="30" width="150" height="6" fill="#25293d" rx="3"/>
      <!-- Line 3: Checklist -->
      <text x="0" y="56" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#10b981">- [x] Render math</text>
      <text x="0" y="72" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#94a3b8">- [ ] Done tasks</text>
      
      <!-- Line 4: Math equation code -->
      <text x="0" y="98" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" fill="#8b5cf6">$$ e^{i\pi} + 1 = 0 $$</text>
      
      <!-- Line 5: Code Block -->
      <text x="0" y="125" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#e0f2fe">```mermaid</text>
      <text x="10" y="140" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" fill="#94a3b8">A --&gt; B</text>
      <text x="0" y="155" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#e0f2fe">```</text>
    </g>

    <!-- Split Pane Splitter -->
    <rect x="240" y="45" width="2" height="251" fill="#25293d"/>

    <!-- Preview Pane (Right Split) -->
    <rect x="242" y="45" width="194" height="251" fill="#0a0b10"/>
    
    <!-- Rendered UI elements in Preview -->
    <g transform="translate(256, 75)">
      <!-- Rendered H1 Header -->
      <text x="0" y="5" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="800" fill="#f1f5f9">Workspace</text>
      <line x1="0" y1="12" x2="166" y2="12" stroke="#25293d" stroke-width="1.5"/>
      
      <!-- Checkbox 1 (Checked) -->
      <rect x="0" y="24" width="10" height="10" fill="#6366f1" rx="2"/>
      <path d="M 2,29 L 4,31 L 8,26" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="16" y="33" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="600" fill="#f1f5f9">Render math</text>
      
      <!-- Checkbox 2 (Unchecked) -->
      <rect x="0" y="40" width="10" height="10" fill="none" stroke="#25293d" stroke-width="1.5" rx="2"/>
      <text x="16" y="49" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Done tasks</text>

      <!-- Rendered Math Formula block -->
      <rect x="0" y="65" width="166" height="30" fill="#11131c" stroke="#25293d" stroke-width="1" rx="6"/>
      <text x="83" y="84" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="700" fill="#8b5cf6" text-anchor="middle">e^(i*π) + 1 = 0</text>
      
      <!-- Rendered Mermaid Box -->
      <g transform="translate(15, 110)">
        <rect x="0" y="0" width="40" height="20" fill="#181b28" stroke="#6366f1" stroke-width="1" rx="4"/>
        <text x="20" y="13" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">A</text>
        
        <path d="M 40,10 L 80,10" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
        <path d="M 76,7 L 80,10 L 76,13 Z" fill="#94a3b8"/>
        
        <rect x="80" y="0" width="40" height="20" fill="#181b28" stroke="#10b981" stroke-width="1" rx="4"/>
        <text x="100" y="13" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="700" fill="#f1f5f9" text-anchor="middle">B</text>
      </g>
    </g>
  </g>
</svg>
